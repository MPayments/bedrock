# ---------------------------------------------------------------------------
# Bedrock — production compose for Dokploy/Traefik deployment
#
# Prerequisites:
#   - External Postgres accessible from dokploy-network
#   - .env with DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#   - .env with TB_ADDRESS, TB_CLUSTER_ID, BETTER_AUTH_SECRET
#   - Public DNS:
#       crm.multihansa.com
#       finance.multihansa.com
#       portal.multihansa.com
#
# Deployment:
#   1. docker compose up db-migrate    # apply migrations
#   2. docker compose up db-seed       # seed data (first deploy only)
#   3. docker compose up -d tigerbeetle api finance crm portal workers
#
# Notes:
#   - api stays internal on dokploy-network.
#   - crm has its own server-side task storage and needs DB env vars too.
#   - crm/finance/portal proxy auth and /v1 traffic to api via API_INTERNAL_URL.
# ---------------------------------------------------------------------------

networks:
  dokploy-network:
    external: true

volumes:
  tigerbeetle-data:

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  tigerbeetle:
    build:
      context: ./tigerbeetle
      dockerfile: Dockerfile
    container_name: bedrock-tigerbeetle
    restart: unless-stopped
    volumes:
      - tigerbeetle-data:/data
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK
    networks:
      - dokploy-network

  # ---------------------------------------------------------------------------
  # Init containers (run once per deploy, then exit)
  # ---------------------------------------------------------------------------
  db-migrate:
    build:
      context: ..
      dockerfile: apps/db/Dockerfile
    container_name: bedrock-db-migrate
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}
    networks:
      - dokploy-network
    restart: "no"

  db-seed:
    build:
      context: ..
      dockerfile: apps/db/Dockerfile
    container_name: bedrock-db-seed
    command: ["node", "--import=tsx", "src/seeds/run-all.ts"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}
    networks:
      - dokploy-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: bedrock-api
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      tigerbeetle:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}
      TB_ADDRESS: ${TB_ADDRESS}
      TB_CLUSTER_ID: ${TB_CLUSTER_ID:-0}
      LOG_LEVEL: ${LOG_LEVEL:-error}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-https://crm.multihansa.com,https://finance.multihansa.com,https://portal.multihansa.com}
      BETTER_AUTH_CRM_URL: ${CRM_PUBLIC_URL:-https://crm.multihansa.com}
      BETTER_AUTH_FINANCE_URL: ${FINANCE_PUBLIC_URL:-https://finance.multihansa.com}
      BETTER_AUTH_PORTAL_URL: ${PORTAL_PUBLIC_URL:-https://portal.multihansa.com}
      BETTER_AUTH_CRM_TRUSTED_ORIGINS: ${BETTER_AUTH_CRM_TRUSTED_ORIGINS:-https://crm.multihansa.com}
      BETTER_AUTH_FINANCE_TRUSTED_ORIGINS: ${BETTER_AUTH_FINANCE_TRUSTED_ORIGINS:-https://finance.multihansa.com}
      BETTER_AUTH_PORTAL_TRUSTED_ORIGINS: ${BETTER_AUTH_PORTAL_TRUSTED_ORIGINS:-https://portal.multihansa.com}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-bedrock-documents}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@bedrock.app}
      NODE_ENV: production
    security_opt:
      - seccomp=unconfined
    networks:
      - dokploy-network
    restart: unless-stopped

  finance:
    build:
      context: ..
      dockerfile: apps/finance/Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://bedrock-api:3000}
    container_name: bedrock-finance
    depends_on:
      - api
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://bedrock-api:3000}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.bedrock-finance.rule=Host(`finance.multihansa.com`)"
      - "traefik.http.routers.bedrock-finance.priority=10"
      - "traefik.http.routers.bedrock-finance.entrypoints=web,websecure"
      - "traefik.http.services.bedrock-finance.loadbalancer.server.port=3000"

  crm:
    build:
      context: ..
      dockerfile: apps/crm/Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://bedrock-api:3000}
        NEXT_PUBLIC_PORTAL_URL: ${PORTAL_PUBLIC_URL:-https://portal.multihansa.com}
        NEXT_PUBLIC_APP_URL: ${CRM_PUBLIC_URL:-https://crm.multihansa.com}
        NEXT_PUBLIC_APP_TITLE: ${CRM_NEXT_PUBLIC_APP_TITLE:-Multihansa CRM}
        NEXT_PUBLIC_APP_DESCRIPTION: ${CRM_NEXT_PUBLIC_APP_DESCRIPTION:-Multihansa CRM}
    container_name: bedrock-crm
    depends_on:
      - api
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://bedrock-api:3000}
      CRM_ACTIVITY_UPSTREAM_URL: ${CRM_ACTIVITY_UPSTREAM_URL:-http://bedrock-api:3000/v1/activity}
      NEXT_PUBLIC_PORTAL_URL: ${PORTAL_PUBLIC_URL:-https://portal.multihansa.com}
      NEXT_PUBLIC_APP_URL: ${CRM_PUBLIC_URL:-https://crm.multihansa.com}
      NEXT_PUBLIC_APP_TITLE: ${CRM_NEXT_PUBLIC_APP_TITLE:-Multihansa CRM}
      NEXT_PUBLIC_APP_DESCRIPTION: ${CRM_NEXT_PUBLIC_APP_DESCRIPTION:-Multihansa CRM}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.bedrock-crm.rule=Host(`crm.multihansa.com`)"
      - "traefik.http.routers.bedrock-crm.priority=10"
      - "traefik.http.routers.bedrock-crm.entrypoints=web,websecure"
      - "traefik.http.services.bedrock-crm.loadbalancer.server.port=3000"

  portal:
    build:
      context: ..
      dockerfile: apps/portal/Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://bedrock-api:3000}
        NEXT_PUBLIC_CRM_URL: ${CRM_PUBLIC_URL:-https://crm.multihansa.com}
        NEXT_PUBLIC_APP_URL: ${PORTAL_PUBLIC_URL:-https://portal.multihansa.com}
        NEXT_PUBLIC_APP_TITLE: ${PORTAL_NEXT_PUBLIC_APP_TITLE:-Multihansa Portal}
        NEXT_PUBLIC_APP_DESCRIPTION: ${PORTAL_NEXT_PUBLIC_APP_DESCRIPTION:-Multihansa customer portal}
    container_name: bedrock-portal
    depends_on:
      - api
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://bedrock-api:3000}
      NEXT_PUBLIC_CRM_URL: ${CRM_PUBLIC_URL:-https://crm.multihansa.com}
      NEXT_PUBLIC_APP_URL: ${PORTAL_PUBLIC_URL:-https://portal.multihansa.com}
      NEXT_PUBLIC_APP_TITLE: ${PORTAL_NEXT_PUBLIC_APP_TITLE:-Multihansa Portal}
      NEXT_PUBLIC_APP_DESCRIPTION: ${PORTAL_NEXT_PUBLIC_APP_DESCRIPTION:-Multihansa customer portal}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.bedrock-portal.rule=Host(`portal.multihansa.com`)"
      - "traefik.http.routers.bedrock-portal.priority=10"
      - "traefik.http.routers.bedrock-portal.entrypoints=web,websecure"
      - "traefik.http.services.bedrock-portal.loadbalancer.server.port=3000"

  workers:
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
    container_name: bedrock-workers
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      tigerbeetle:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}
      TB_ADDRESS: ${TB_ADDRESS}
      TB_CLUSTER_ID: ${TB_CLUSTER_ID:-0}
      LOG_LEVEL: ${LOG_LEVEL:-error}
      WORKERS_MONITORING_HOST: "0.0.0.0"
      WORKERS_MONITORING_PORT: 8081
      LEDGER_WORKER_INTERVAL_MS: ${LEDGER_WORKER_INTERVAL_MS:-5000}
      DOCUMENTS_WORKER_INTERVAL_MS: ${DOCUMENTS_WORKER_INTERVAL_MS:-5000}
      DOCUMENTS_PERIOD_CLOSE_WORKER_INTERVAL_MS: ${DOCUMENTS_PERIOD_CLOSE_WORKER_INTERVAL_MS:-60000}
      BALANCES_WORKER_INTERVAL_MS: ${BALANCES_WORKER_INTERVAL_MS:-5000}
      TREASURY_RATES_WORKER_INTERVAL_MS: ${TREASURY_RATES_WORKER_INTERVAL_MS:-60000}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-bedrock-documents}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: production
    security_opt:
      - seccomp=unconfined
    networks:
      - dokploy-network
    restart: unless-stopped
