# ---------------------------------------------------------------------------
# Bedrock — production compose for Dokploy/Traefik deployment
#
# Prerequisites:
#   - External Postgres and TigerBeetle accessible from dokploy-network
#   - .env with DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD, TB_ADDRESS
#
# Deployment:
#   1. docker compose up db-migrate    # apply migrations
#   2. docker compose up db-seed       # seed data (first deploy only)
#   3. docker compose up -d api web workers
#
# Access: http://<SERVER_IP> (Traefik catch-all, priority=1)
# ---------------------------------------------------------------------------

networks:
  dokploy-network:
    external: true

services:
  # ---------------------------------------------------------------------------
  # Init containers (run once per deploy, then exit)
  # ---------------------------------------------------------------------------
  db-migrate:
    build:
      context: ..
      dockerfile: apps/db/Dockerfile
    container_name: bedrock-db-migrate
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - dokploy-network
    restart: "no"

  db-seed:
    build:
      context: ..
      dockerfile: apps/db/Dockerfile
    container_name: bedrock-db-seed
    command: ["node", "--import=tsx", "src/seeds/run-all.ts"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - dokploy-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: bedrock-api
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      PORT: 3002
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TB_ADDRESS: ${TB_ADDRESS}
      TB_CLUSTER_ID: ${TB_CLUSTER_ID:-0}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: bedrock-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://bedrock-api:3002
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.bedrock-web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.bedrock-web.priority=1"
      - "traefik.http.routers.bedrock-web.entrypoints=web"
      - "traefik.http.services.bedrock-web.loadbalancer.server.port=3000"

  workers:
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
    container_name: bedrock-workers
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TB_ADDRESS: ${TB_ADDRESS}
      TB_CLUSTER_ID: ${TB_CLUSTER_ID:-0}
      WORKERS_MONITORING_HOST: "0.0.0.0"
      WORKERS_MONITORING_PORT: 8081
      LEDGER_WORKER_INTERVAL_MS: ${LEDGER_WORKER_INTERVAL_MS:-5000}
      DOCUMENTS_WORKER_INTERVAL_MS: ${DOCUMENTS_WORKER_INTERVAL_MS:-5000}
      DOCUMENTS_PERIOD_CLOSE_WORKER_INTERVAL_MS: ${DOCUMENTS_PERIOD_CLOSE_WORKER_INTERVAL_MS:-60000}
      BALANCES_WORKER_INTERVAL_MS: ${BALANCES_WORKER_INTERVAL_MS:-5000}
      FX_RATES_WORKER_INTERVAL_MS: ${FX_RATES_WORKER_INTERVAL_MS:-60000}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: unless-stopped
