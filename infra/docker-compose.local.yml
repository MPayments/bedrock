services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./data/${DB_NAME}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  tigerbeetle:
    build:
      context: ./tigerbeetle
      dockerfile: Dockerfile
    container_name: bedrock-tigerbeetle
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK

  # ---------------------------------------------------------------------------
  # Init containers (run once, then exit)
  # ---------------------------------------------------------------------------
  db-migrate:
    build:
      context: ..
      dockerfile: apps/db/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: "no"

  db-seed:
    build:
      context: ..
      dockerfile: apps/db/Dockerfile
    command: ["node", "--import=tsx", "src/seeds/run-all.ts"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: "no"

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      tigerbeetle:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TB_ADDRESS: bedrock-tigerbeetle:3000
      TB_CLUSTER_ID: ${TB_CLUSTER_ID:-0}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
      NODE_ENV: production
    security_opt:
      - seccomp=unconfined

  finance:
    build:
      context: ..
      dockerfile: apps/finance/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3000
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
      NODE_ENV: production

  crm:
    build:
      context: ..
      dockerfile: apps/crm/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3000
        NEXT_PUBLIC_PORTAL_URL: http://localhost:3003
    restart: unless-stopped
    ports:
      - "${CRM_PORT:-3002}:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
      NEXT_PUBLIC_PORTAL_URL: http://localhost:3003
      NODE_ENV: production

  portal:
    build:
      context: ..
      dockerfile: apps/portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3000
        NEXT_PUBLIC_CRM_URL: http://localhost:3002
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-3003}:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
      NEXT_PUBLIC_CRM_URL: http://localhost:3002
      NODE_ENV: production

  workers:
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
    restart: unless-stopped
    ports:
      - "${WORKERS_MONITORING_PORT:-8081}:8081"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      tigerbeetle:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TB_ADDRESS: bedrock-tigerbeetle:3000
      TB_CLUSTER_ID: ${TB_CLUSTER_ID:-0}
      WORKERS_MONITORING_HOST: "0.0.0.0"
      WORKERS_MONITORING_PORT: 8081
      LEDGER_WORKER_INTERVAL_MS: ${LEDGER_WORKER_INTERVAL_MS:-5000}
      DOCUMENTS_WORKER_INTERVAL_MS: ${DOCUMENTS_WORKER_INTERVAL_MS:-5000}
      DOCUMENTS_PERIOD_CLOSE_WORKER_INTERVAL_MS: ${DOCUMENTS_PERIOD_CLOSE_WORKER_INTERVAL_MS:-60000}
      BALANCES_WORKER_INTERVAL_MS: ${BALANCES_WORKER_INTERVAL_MS:-5000}
      TREASURY_RATES_WORKER_INTERVAL_MS: ${TREASURY_RATES_WORKER_INTERVAL_MS:-60000}
      NODE_ENV: production
    security_opt:
      - seccomp=unconfined
