name: "Setup Bedrock"
description: "Install Node.js, Bun, and project dependencies. Checkout must be run first."

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.6"

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
