name: Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Check changed-file hotspots
        if: github.event_name == 'pull_request'
        run: |
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"

          if [ -z "$changed_files" ]; then
            exit 0
          fi

          printf '%s\n' "$changed_files" | xargs -r node ./scripts/check-hotspots.mjs

      - name: Check architecture boundaries
        run: bun run check:architecture

      - name: Check manifests and import surfaces
        run: bun run check:manifests

      - name: Check workspace graph
        run: bun run check:graph

      - name: Check types
        run: bun run check-types

      - name: Build API package
        run: bun run build --filter=api

      - name: Run lint
        run: bun run lint

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit
